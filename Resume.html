                                        <div className="flex items-center gap-3 mb-6">
                                            <h4 className="bg-[#ffdd33] text-[#1C1C1E] px-3 py-1 rounded-md text-[11px] font-black uppercase tracking-widest shadow-[2px_2px_0px_#1C1C1E]">Why it matters</h4>
                                            <div className="h-px flex-grow bg-black/10"></div>
                                        </div>
                                        <div className="text-base md:text-lg font-light text-[#1C1C1E]/80 italic leading-relaxed whitespace-pre-wrap">{selected.outcome}</div>
                                    </section>
                                </div>
                            </div>
                        )}
                    </div>

                    {selected && <div className="fixed inset-0 z-[900] bg-[#1C1C1E]/30 backdrop-blur-md" onClick={() => setSelected(null)}></div>}

                    <footer className="w-full py-12 px-6 flex flex-col items-center gap-4 opacity-30 select-none">
                        <div className="h-[1px] w-full max-w-md bg-[#1C1C1E]/20"></div>
                        <p className="text-[10px] font-black tracking-[0.8em] uppercase text-center">Steven Matos • Professional Services Leader • © 2026</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
