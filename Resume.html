<!DOCTYPE html>
<html lang="en">
<head>

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,700;0,900;1,900&display=swap');
        
        body {
            background-color: #FFFFFF;
            font-family: 'Inter', sans-serif;
            color: #1C1C1E;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        .miro-grid {
            position: fixed;
            inset: 0;
            background-image: radial-gradient(#EAEAEA 1.5px, transparent 0);
            background-size: 24px 24px;
            z-index: -1;
        }

        .miro-header-1 { 
            font-weight: 900; 
            font-style: italic; 
            text-transform: uppercase; 
            font-size: clamp(32px, 10vw, 72px); 
            line-height: 1.1; 
            letter-spacing: -0.05em; 
            white-space: normal; 
            word-break: break-word;
        }
        .miro-header-2 { 
            font-weight: 900; 
            font-style: italic; 
            text-transform: uppercase; 
            font-size: clamp(24px, 7vw, 42px);
            line-height: 1.1; 
            letter-spacing: -0.03em; 
        }
        
        .section-anchor {
            border-left: 8px solid #ffdd33;
            padding-left: 1.25rem;
        }

        .point-title {
            font-weight: 900;
            text-transform: uppercase;
            font-size: 14px;
            font-style: italic;
            letter-spacing: 0.12em;
            color: #867AFF;
            display: inline-block;
            margin-right: 4px;
        }

        .bullet-point {
            position: relative;
            cursor: pointer;
            padding: 10px 12px;
            margin-left: -12px;
            border-radius: 12px;
            transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .bullet-point:hover {
            background: #F4F4F4;
            transform: translateX(8px);
        }
        .bullet-point::before {
            content: "→";
            position: absolute;
            left: -15px;
            opacity: 0;
            color: #867AFF;
            font-weight: 900;
            transition: opacity 0.2s;
        }
        .bullet-point:hover::before { opacity: 1; }

        .sidebar-card {
            border: 4px solid #1C1C1E;
            box-shadow: 8px 8px 0px #1C1C1E;
            transition: transform 0.2s;
        }
        .sidebar-card:hover { transform: rotate(-1deg); }

        .flyout-panel {
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: -20px 0 60px rgba(0,0,0,0.15);
        }

        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #1C1C1E; border-radius: 10px; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade { animation: fadeIn 0.4s ease-out forwards; }

        .instruction-tag {
            background: #867AFF;
            color: white;
            box-shadow: 0 4px 12px rgba(134, 122, 255, 0.2);
            transition: transform 0.2s;
        }
        .instruction-tag:hover {
            transform: translateY(-1px);
        }
    </style>
</head>
